<!DOCTYPE html>
<html>
<head>
    <title>AI Shopping List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">🛒 Scan List</h1>
        
        <input type="file" id="imageInput" accept="image/*" class="mb-4 block w-full text-sm text-gray-500">
        <button onclick="uploadImage()" id="btn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold">Convert to Digital</button>

        <div id="loading" class="hidden mt-4 text-center text-blue-500">AI is reading your list...</div>
        
        <div id="listContainer" class="mt-6"></div>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return alert("Please select an image");

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('btn').disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('btn').disabled = false;

            if (data.error) {
                alert("Error: " + data.error);
                return;
            }

            renderList(data);
        }

        function renderList(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = "";
            data.Categories.forEach(cat => {
                let html = `<div class="mb-4"><h3 class="font-bold text-gray-700 border-b">${cat.name}</h3>`;
                cat.items.forEach(item => {
                    html += `
                        <div class="flex items-center mt-2">
                            <input type="checkbox" class="w-5 h-5 mr-2">
                            <label class="text-lg">${item}</label>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
